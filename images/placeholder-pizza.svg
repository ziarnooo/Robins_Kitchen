<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grain" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#F4EEE2"/>
      <circle cx="20" cy="30" r="0.5" fill="#5C4032" opacity="0.15"/>
      <circle cx="60" cy="50" r="0.5" fill="#5C4032" opacity="0.12"/>
      <circle cx="40" cy="80" r="0.5" fill="#5C4032" opacity="0.18"/>
      <circle cx="85" cy="20" r="0.5" fill="#5C4032" opacity="0.13"/>
      <circle cx="10" cy="65" r="0.5" fill="#5C4032" opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="400" height="500" fill="url(#grain)"/>
  <g transform="translate(200, 220)" opacity="0.55">
    <circle r="120" fill="none" stroke="#7BA428" stroke-width="1.5" stroke-dasharray="3 4"/>
    <circle r="100" fill="#FBF8F1"/>
    <circle r="100" fill="none" stroke="#C44536" stroke-width="1" opacity="0.6"/>
    <circle cx="-30" cy="-20" r="8" fill="#C44536" opacity="0.7"/>
    <circle cx="40" cy="-30" r="7" fill="#C44536" opacity="0.65"/>
    <circle cx="20" cy="35" r="9" fill="#C44536" opacity="0.7"/>
    <circle cx="-45" cy="30" r="6" fill="#C44536" opacity="0.6"/>
    <circle cx="55" cy="25" r="7" fill="#C44536" opacity="0.65"/>
    <ellipse cx="-15" cy="0" rx="4" ry="2" fill="#7BA428" opacity="0.7" transform="rotate(30 -15 0)"/>
    <ellipse cx="30" cy="10" rx="4" ry="2" fill="#7BA428" opacity="0.7" transform="rotate(-20 30 10)"/>
    <ellipse cx="0" cy="-45" rx="4" ry="2" fill="#7BA428" opacity="0.7" transform="rotate(60 0 -45)"/>
    <ellipse cx="-50" cy="-5" rx="4" ry="2" fill="#7BA428" opacity="0.7"/>
    <ellipse cx="45" cy="-5" rx="4" ry="2" fill="#7BA428" opacity="0.7" transform="rotate(45 45 -5)"/>
  </g>
  <text x="200" y="400" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#5C4032" opacity="0.7">Pizza photo coming soon</text>
  <text x="200" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="3" fill="#5C7E1E" opacity="0.6">FROM ROBIN'S KITCHEN</text>
</svg>
